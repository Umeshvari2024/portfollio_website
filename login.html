<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Portfolio Login</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body class="login-page">

    <!-- LOGIN CARD -->

    <div class="login-card">

        <h1 class="login-title">

            Portfolio Login

        </h1>

        <p class="login-subtitle">

            Login to continue your portfolio journey 🚀

        </p>

        <!-- LOGIN FORM -->

        <form id="loginForm">

            <!-- EMAIL -->

            <div class="input-box">

                <label>

                    Enter Email

                </label>

                <input type="email"
                       id="email"
                       placeholder="Enter Email"
                       required>

            </div>

            <!-- PASSWORD -->

            <div class="input-box">

                <label>

                    Enter Password

                </label>

                <input type="password"
                       id="password"
                       placeholder="Enter Password"
                       required>

            </div>

            <!-- LOGIN BUTTON -->

            <button type="submit"
                    class="login-btn">

                Login

            </button>

        </form>

    </div>

    <!-- JS FILE -->

    <script src="js/login.js"></script>

</body>

</html>
